services:
  - type: web
    name: weekly-planner-ai-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false        # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false        # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false        # set to your Vercel URL after deploying frontend
